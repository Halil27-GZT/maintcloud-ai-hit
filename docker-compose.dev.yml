services:
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: maintcloud-frontend-dev
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${FRONTEND_DEV_API_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_DEV_PORT:-5174}:5173"
    volumes:
      - ./frontend:/app
      - maintcloud_frontend_node_modules:/app/node_modules
    restart: unless-stopped
  backend:
    ports:
      - "${BACKEND_DEV_PORT:-8000}:8000"
