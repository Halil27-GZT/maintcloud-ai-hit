name: MaintCloud AI CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff Linting
        run: |
          ruff check .

      - name: Pytest ausfuehren
        run: |
          pytest -m "not integration_postgres"

  postgres-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: maintcloud
          POSTGRES_USER: maintcloud
          POSTGRES_PASSWORD: maintcloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U maintcloud -d maintcloud"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+psycopg://maintcloud:maintcloud@localhost:5432/maintcloud

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Auf PostgreSQL warten
        run: |
          python - <<'PY'
          import time
          import psycopg

          last_error = None
          for _ in range(60):
              try:
                  with psycopg.connect("postgresql://maintcloud:maintcloud@localhost:5432/maintcloud") as conn:
                      conn.execute("SELECT 1")
                  raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(1)

          raise SystemExit(f"PostgreSQL not ready: {last_error}")
          PY

      - name: PostgreSQL-Integrationstest ausfuehren
        run: |
          pytest -m integration_postgres tests/test_postgres_integration.py