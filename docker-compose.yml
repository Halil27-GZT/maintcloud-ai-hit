services:
  postgres:
    image: postgres:16-alpine
    container_name: maintcloud-postgres
    environment:
      POSTGRES_DB: maintcloud
      POSTGRES_USER: maintcloud
      POSTGRES_PASSWORD: maintcloud
    ports:
      - "5432:5432"
    volumes:
      - maintcloud_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maintcloud -d maintcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: maintcloud-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://maintcloud:maintcloud@postgres:5432/maintcloud
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: /api
    container_name: maintcloud-frontend
    depends_on:
      - backend
    restart: unless-stopped
  proxy:
    build:
      context: ./infra/reverse-proxy
      dockerfile: Dockerfile
    container_name: maintcloud-proxy
    depends_on:
      - frontend
      - backend
    environment:
      SERVER_NAME: localhost
      HTTPS_PORT: 5443
    ports:
      - "5173:80"
      - "5443:443"
    volumes:
      - maintcloud_proxy_certs:/etc/nginx/certs
    restart: unless-stopped
  backend-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    profiles:
      - test
    container_name: maintcloud-backend-test
    working_dir: /app/backend
    environment:
      DATABASE_URL: sqlite:///./test.db
    command: ["python", "-m", "pytest"]

volumes:
  maintcloud_postgres_data:
  maintcloud_frontend_node_modules:
  maintcloud_proxy_certs:
