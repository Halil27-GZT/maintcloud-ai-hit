services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: maintcloud-backend
    environment:
      DATABASE_URL: sqlite:////data/maintcloud.db
    ports:
      - "8000:8000"
    volumes:
      - maintcloud_data:/data
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maintcloud-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - maintcloud_frontend_node_modules:/app/node_modules
    restart: unless-stopped
  backend-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    profiles:
      - test
    container_name: maintcloud-backend-test
    working_dir: /app/backend
    environment:
      DATABASE_URL: sqlite:///./test.db
    command: ["python", "-m", "pytest"]

volumes:
  maintcloud_data:
  maintcloud_frontend_node_modules:
